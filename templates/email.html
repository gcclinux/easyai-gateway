<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        .token { background-color: #e9ecef; padding: 15px; border-radius: 4px; font-family: monospace; font-size: 18px; word-break: break-all; margin: 20px 0; text-align: center; color: #000; letter-spacing: 1px;}
        .footer { margin-top: 30px; font-size: 12px; color: #888; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
        h2 { color: #222; margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Your Admin Login Token</h2>
        <p>Hello,</p>
        <p>A login attempt was made for the admin dashboard. Please use the following token to complete your login:</p>
        <div class="token">{{.Token}}</div>
        <p>This token will expire in 10 minutes. If you did not request this, please ignore this email.</p>
        <div class="footer">
            Admin Dashboard App
        </div>
    </div>
</body>
</html>
