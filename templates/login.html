<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - EasyAI Gateway</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: var(--card-bg);
            margin: 15% auto;
            padding: 30px;
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-content p {
            margin-bottom: 25px;
            color: var(--text-main);
        }

        .error-title {
            color: var(--danger);
            margin-bottom: 10px;
            font-size: 1.25rem;
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border);
            margin: 30px 0;
        }

        #token {
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Admin Login</h2>
            <p>Access the EasyAI Gateway management dashboard.</p>

            <form id="requestForm">
                <button type="submit" class="secondary">Request Login Token</button>
            </form>

            <hr>

            <form id="loginForm" autocomplete="off">
                <div class="form-input">
                    <label for="token">Enter Security Token</label>
                    <input type="text" id="token" name="token" maxlength="64" minlength="64" required
                        placeholder="Paste 64-character token" autocomplete="off">
                </div>
                <button type="submit">Unlock Dashboard</button>
            </form>
        </div>
    </div>

    <!-- Message Modal -->
    <div id="msgModal" class="modal">
        <div class="modal-content">
            <p id="modalText"></p>
            <button onclick="document.getElementById('msgModal').style.display='none'">Dismiss</button>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <h3 class="error-title">Access Denied</h3>
            <p id="errorText">Invalid or expired token.</p>
            <button onclick="closeErrorAndClear()">Try Again</button>
        </div>
    </div>

    <script>
        // Handle Token Request
        document.getElementById("requestForm").addEventListener("submit", function (event) {
            event.preventDefault();
            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            fetch("/request-login", { method: "POST" })
                .then(response => {
                    if (!response.ok) return response.text().then(t => { throw new Error(t) });
                    return response.text();
                })
                .then(text => {
                    document.getElementById("modalText").innerText = text;
                    document.getElementById("msgModal").style.display = "block";
                })
                .catch(error => {
                    document.getElementById("modalText").innerText = error.message;
                    document.getElementById("msgModal").style.display = "block";
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = 'Request Login Token';
                });
        });

        // Handle Login Submission
        document.getElementById("loginForm").addEventListener("submit", function (event) {
            event.preventDefault();
            const btn = this.querySelector('button');
            btn.disabled = true;

            const token = document.getElementById("token").value;
            const formData = new URLSearchParams();
            formData.append('token', token);

            fetch("/login", {
                method: "POST",
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            })
                .then(response => {
                    if (response.redirected) {
                        window.location.href = response.url;
                    } else if (!response.ok) {
                        return response.text().then(t => { throw new Error(t) });
                    }
                })
                .catch(error => {
                    document.getElementById("errorText").innerText = error.message || "An unknown error occurred.";
                    document.getElementById("errorModal").style.display = "block";
                    btn.disabled = false;
                });
        });

        function closeErrorAndClear() {
            document.getElementById('errorModal').style.display = 'none';
            document.getElementById('token').value = '';
            document.getElementById('token').focus();
        }
    </script>
</body>

</html>
